version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: mod

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic

  disable:
    - prealloc
    - gosec
    - unparam

formatters:
  enable:
    - goimports   # ✅ 放这里

linters-settings:
  errcheck:
    check-blank: true

  govet:
    shadow: true

  goimports:
    local-prefixes: github.com/leonkaihao/msggw

  misspell:
    locale: US

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - commentFormatting
      - hugeParam

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

  max-same-issues: 5
  max-issues-per-linter: 50